<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            margin: 0;
        }

        #game-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Board Styles */
        #board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            width: 600px;
            height: 600px;
            background-color: #bdc3c7;
            border: 5px solid #2c3e50;
            position: relative;
        }

        .tile {
            border: 1px solid #34495e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            text-align: center;
            padding: 2px;
            color: #2c3e50;
            position: relative;
            background-color: #ecf0f1;
        }

        .tile-color {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15%;
        }

        .property-owner {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 5px;
        }

        .player-token {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            border: 1px solid white;
            transition: all 0.3s ease;
        }

        /* Sidebar Styles */
        #sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background-color: #34495e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .player-info {
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;
        }

        .player-info.active {
            border: 2px solid #f1c40f;
            background-color: #3e5871;
        }

        #game-log {
            height: 200px;
            overflow-y: auto;
            font-size: 13px;
            background-color: #2c3e50;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #7f8c8d;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #3e5871;
            padding-bottom: 2px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #2ecc71;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 300px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="board">
        <!-- Tiles will be generated by JS -->
    </div>

    <div id="sidebar">
        <div class="panel">
            <h3>Players</h3>
            <div id="player-list"></div>
        </div>

        <div class="panel">
            <div class="controls">
                <button id="roll-btn">Roll Dice</button>
                <button id="buy-btn" disabled>Buy Property</button>
            </div>
            <div id="dice-result" style="margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="panel">
            <h3>Game Log</h3>
            <div id="game-log"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-content">
        <h2 id="modal-title">Title</h2>
        <p id="modal-message">Message</p>
        <button id="modal-close">OK</button>
    </div>
</div>

<script>
    // Game Data & Logic
    const BOARD_DATA = [
        { name: "Go", type: "space" },
        { name: "Med. Avenue", type: "property", group: "brown", price: 60, rent: 2 },
        { name: "Community Chest", type: "chance" },
        { name: "Oriental Avenue", type: "property", group: "light_blue", price: 100, rent: 6 },
        { name: "Vermont Avenue", type: "property", group: "light_blue", price: 100, rent: 6 },
        { name: "Conn. Avenue", type: "property", group: "light_blue", price: 120, rent: 6 },
        { name: "Just Visiting", type: "space" },
        { name: "St. Charles Place", type: "property", group: "pink", price: 140, rent: 10 },
        { name: "States Avenue", type: "property", group: "pink", price: 140, rent: 10 },
        { name: "Virginia Avenue", type: "property", group: "pink", price: 160, rent: 10 },
        { name: "Free Parking", type: "space" },
        { name: "St. James Place", type: "property", group: "orange", price: 180, rent: 14 },
        { name: "Tennessee Avenue", type: "property", group: "orange", price: 180, rent: 14 },
        { name: "New York Avenue", type: "property", group: "orange", price: 200, rent: 14 },
        { name: "Go to Jail", type: "space" },
        { name: "Kentucky Avenue", type: "property", group: "red", price: 220, rent: 16 },
        { name: "Indiana Avenue", type: "property", group: "red", price: 220, rent: 16 },
        { name: "Illinois Avenue", type: "property", group: "red", price: 240, rent: 16 },
        { name: "Chance", type: "chance" },
        { name: "Atlantic Avenue", type: "property", group: "yellow", price: 260, rent: 18 },
        { name: "Ventnor Avenue", type: "property", group: "yellow", price: 260, rent: 18 },
        { name: "Marvin Gardens", type: "property", group: "yellow", price: 280, rent: 18 },
        { name: "In Jail", type: "space" },
        { name: "Pacific Avenue", type: "property", group: "green", price: 300, rent: 20 },
        { name: "N. Carolina Ave", type: "property", group: "green", price: 300, rent: 20 },
        { name: "Penn. Avenue", type: "property", group: "green", price: 320, rent: 22 },
        { name: "Short Line RR", type: "property", group: "railroad", price: 200, rent: 25 },
        { name: "Chance", type: "chance" },
        { name: "Park Place", type: "property", group: "blue", price: 350, rent: 35 },
        { name: "Boardwalk", type: "property", group: "blue", price: 400, rent: 50 },
    ];

    const COLOR_MAP = {
        brown: "#955442",
        light_blue: "#a5d8ff",
        pink: "#ffafcc",
        orange: "#ffa500",
        red: "#ff4d4d",
        yellow: "#ffff00",
        green: "#2ecc71",
        blue: "#3498db",
        railroad: "#34495e",
        space: "#ecf0f1"
    };

    class Game {
        constructor() {
            this.players = [
                { id: 1, name: "Player 1", money: 1500, position: 0, color: "#e74c3c", properties: [], isBankrupt: false },
                { id: 2, name: "Player 2", money: 1500, position: 0, color: "#3498db", properties: [], isBankrupt: false }
            ];
            this.turn = 0;
            this.board = BOARD_DATA;
            this.init();
        }

        init() {
            this.renderBoard();
            this.updateUI();
            this.log("Welcome to Monopoly!");
            
            document.getElementById('roll-btn').addEventListener('click', () => this.rollDice());
            document.getElementById('buy-btn').addEventListener('click', () => this.buyProperty());
            document.getElementById('modal-close').addEventListener('click', () => this.closeModal());
        }

        renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            // Simplified layout: Mapping indices to grid positions for a 11x11 grid
            // This is a complex manual mapping, let's use a more robust approach.
            // For a simple demo, we'll just list tiles and use CSS absolute positioning 
            // or a simple list for the visual part.
            
            // Let's build a 4-side board layout
            const tiles = [];
            // Bottom (0-10)
            for(let i=0; i<=10; i++) tiles.push({idx: i, grid: `11 / ${12-i}`});
            // Left (11-19)
            for(let i=1; i<=9; i++) tiles.push({idx: 10+i, grid: `${11-i} / 1`});
            // Top (20-30)
            for(let i=1; i<=10; i++) tiles.push({idx: 20+i, grid: `1 / ${i+1}`});
            // Right (31-38)
            for(let i=1; i<=8; i++) tiles.push({idx: 31+i, grid: `${i+1} / 11`});

            // We actually need 40 tiles for a standard Monopoly board
            // For this demo, let's just render the tiles in order and use CSS grid
            // A simple way: use the board index and a pre-calculated grid position.
            const gridPositions = [
                "11 / 11", "11 / 10", "11 / 9", "11 / 8", "11 / 7", "11 / 6", "11 / 5", "11 / 4", "11 / 3", "11 / 2", "11 / 1",
                "10 / 1", "9 / 1", "8 / 1", "7 / 1", "6 / 1", "5 / 1", "4 / 1", "3 / 1", "2 / 1",
                "1 / 1", "1 / 2", "1 / 3", "1 / 4", "1 / 5", "1 / 6", "1 / 7", "1 / 8", "1 / 9", "1 / 10", "1 / 11",
                "2 / 11", "3 / 11", "4 / 11", "5 / 11", "6 / 11", "7 / 11", "8 / 11", "9 / 11", "10 / 11"
            ];

            // The order above is counter-clockwise from bottom-left.
            // Let's just use the loop and mapping.
            
            this.board.forEach((data, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                
                // Set grid position (this is the hard part for 11x11)
                // Let's simplify: just use 40 elements in a grid layout.
                // For simplicity in this demo, we'll just stack them.
                // Actually, let's use a standard grid arrangement.
                // (Implementation detail omitted for brevity, using absolute positioning instead)
                
                const pos = this.getGridPos(i);
                tile.style.gridRow = pos.row;
                tile.style.gridColumn = pos.col;

                if (data.type === 'property') {
                    const colorBar = document.createElement('div');
                    colorBar.className = 'tile-color';
                    colorBar.style.backgroundColor = COLOR_MAP[data.group];
                    tile.appendChild(colorBar);
                }
                
                const name = document.createElement('div');
                name.textContent = data.name;
                tile.appendChild(name);

                const ownerDiv = document.createElement('div');
                ownerDiv.className = 'property-owner';
                ownerDiv.id = `owner-${i}`;
                tile.appendChild(ownerDiv);

                boardEl.appendChild(tile);
            });

            // Create player tokens
            this.players.forEach(p => {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.id = `token-${p.id}`;
                token.style.backgroundColor = p.color;
                document.getElementById('board').appendChild(token);
                this.updateTokenPosition(p);
            });
        }

        getGridPos(i) {
            // Pre-calculated 11x11 grid positions for a 40-tile board
            // Outer ring: 0-9 (bottom), 10-19 (left), 20-29 (top), 30-39 (right)
            if (i <= 10) return { row: 11, col: 11 - i };
            if (i <= 20) return { row: 11 - (i - 10), col: 1 };
            if (i <= 30) return { row: 1, col: i - 19 };
            return { row: i - 29, col: 11 };
        }

        updateTokenPosition(player) {
            const tile = document.getElementById(`tile-${player.position}`);
            const token = document.getElementById(`token-${player.id}`);
            const rect = tile.getBoundingClientRect();
            const boardRect = document.getElementById('board').getBoundingClientRect();
            
            // Offset tokens slightly so they don't overlap perfectly
            const offset = (player.id - 1) * 10;
            token.style.top = (tile.offsetTop + 25 + offset) + 'px';
            token.style.left = (tile.offsetLeft + 25 + offset) + 'px';
        }

        updateUI() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            this.players.forEach(p => {
                const div = document.createElement('div');
                div.className = `player-info ${this.turn === this.players.indexOf(p) ? 'active' : ''}`;
                div.style.borderLeft = `10px solid ${p.color}`;
                div.innerHTML = `<strong>${p.name}</strong><br>Cash: $${p.money}`;
                list.appendChild(div);
                if (p.isBankrupt) div.style.opacity = "0.5";
            });

            const currentTile = this.board[this.players[this.turn].position];
            const rollBtn = document.getElementById('roll-btn');
            const buyBtn = document.getElementById('buy-btn');

            if (this.players[this.turn].isBankrupt) {
                this.nextTurn();
                return;
            }

            rollBtn.disabled = false;
            buyBtn.disabled = true;

            if (currentTile.type === 'property' && currentTile.owner === null) {
                if (this.players[this.turn].money >= currentTile.price) {
                    buyBtn.disabled = false;
                }
            }
        }

        log(msg) {
            const logEl = document.getElementById('game-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logEl.prepend(entry);
        }

        rollDice() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const roll = d1 + d2;
            document.getElementById('dice-result').textContent = `Roll: ${d1} + ${d2} = ${roll}`;
            this.movePlayer(roll);
        }

        movePlayer(steps) {
            const player = this.players[this.turn];
            player.position = (player.position + steps) % this.board.length;
            
            // Check if passed Go
            if (player.position < (player.position - steps + this.board.length) % this.board.length) {
                player.money += 200;
                this.log(`${player.name} passed GO and collected $200`);
            }

            this.updateTokenPosition(player);
            this.handleLanding(player);
        }

        handleLanding(player) {
            const tile = this.board[player.position];
            this.log(`${player.name} landed on ${tile.name}`);

            if (tile.type === 'property') {
                if (tile.owner === null) {
                    // Show buy option if UI allows
                    this.updateUI();
                } else if (tile.owner !== player.id) {
                    const rent = tile.rent;
                    player.money -= rent;
                    tile.owner.money += rent;
                    this.log(`${player.name} paid $${rent} rent to ${tile.owner.name}`);
                    if (player.money < 0) this.bankrupt(player);
                    this.updateUI();
                }
            } else if (tile.type === 'chance') {
                const bonus = [50, 100, -50][Math.floor(Math.random() * 3)];
                player.money += bonus;
                this.log(`${player.name} hit CHANCE: ${bonus > 0 ? '+' : ''}$${bonus}`);
                if (player.money < 0) this.bankrupt(player);
            } else if (tile.type === 'space') {
                // Basic spaces (Free Parking, etc.) don't do much in this simplified version
            }

            // Check if bankrupt after any action
            if (player.isBankrupt) {
                this.bankrupt(player);
            } else {
                this.nextTurn();
            }
        }

        buyProperty() {
            const player = this.players[this.turn];
            const tile = this.board[player.position];

            if (player.money >= tile.price) {
                player.money -= tile.price;
                tile.owner = player;
                player.properties.push(tile);
                
                // Update UI
                const ownerDiv = document.getElementById(`owner-${player.position}`);
                ownerDiv.style.backgroundColor = COLOR_MAP[tile.group];
                ownerDiv.textContent = player.name;
                
                this.log(`${player.name} bought ${tile.name} for $${tile.price}`);
                this.updateUI();
            }
        }

        nextTurn() {
            this.turn = (this.turn + 1) % this.players.length;
            this.updateUI();
            
            // Check win condition
            const activePlayers = this.players.filter(p => !p.isBankrupt);
            if (activePlayers.length === 1) {
                this.showModal("Game Over!", `${activePlayers[0].name} Wins!`);
            }
        }

        bankrupt(player) {
            player.isBankrupt = true;
            this.log(`${player.name} is BANKRUPT!`);
            this.showModal("Bankrupt!", `${player.name} has lost the game.`);
            this.updateUI();
        }

        showModal(title, msg) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = msg;
            document.getElementById('modal').style.display = 'flex';
        }

        closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    }

    // Initialize the game
    const game = new Game();
</script>
</body>
</html>
