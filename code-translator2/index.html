<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#58a6ff" />
    <meta name="description" content="Translate code between programming languages with regex and LLM-powered translations. Support for Python, C++, JavaScript, TypeScript, and more." />
    <meta name="author" content="Code Translator" />
    <meta property="og:title" content="Code Translator - Translate code between languages" />
    <meta property="og:description" content="Fast regex-based and AI-powered code translation between Python, C++, JavaScript, TypeScript, and more." />
    <meta property="og:type" content="website" />
    <title>Code Translator - Translate code between languages</title>
    <style>
      body { margin: 0; background: #0d1117; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; z-index: 9999;
      }
      #loading .spinner {
        width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
      });
      // Handle shared URLs
      const hash = window.location.hash;
      if (hash.startsWith('#share/')) {
        try {
          const data = JSON.parse(atob(hash.slice(7)));
          localStorage.setItem('code-translator-shared', JSON.stringify(data));
        } catch {}
      }
    </script>
  </body>
</html>
